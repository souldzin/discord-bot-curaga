name: Python setup
description: Set up Python with pip caching for this repository.

inputs:
  python-version:
    description: Python version to install
    required: false
    default: "3.13"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: requirements.lock.txt
